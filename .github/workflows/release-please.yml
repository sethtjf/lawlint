name: Release Please

# Release-PR flow (compatible with the "Protect default branch" ruleset, which
# requires every change to main — including version bumps — to arrive via PR):
#
#   feat/fix PRs merge to main
#     -> release-please maintains a "chore: release X.Y.Z" PR that bumps the
#        version (Cargo.toml + manifest) and updates CHANGELOG.md
#     -> a human reviews and merges that release PR (a normal PR, so the ruleset
#        is satisfied — nothing is force-pushed to main and no bypass is needed)
#     -> on that merge, release-please creates the vX.Y.Z tag + GitHub Release,
#        and this workflow calls release.yml to build and publish CLI + desktop
#        artifacts for the tagged commit.
#
# A tag created by GITHUB_TOKEN does not itself trigger release.yml's tag push
# event, which is why the publish job invokes it directly via workflow_call.

on:
  push:
    branches:
      - main
  # Manual lever: run release-please on demand (e.g. if a merge commit happened
  # to carry a CI-skip token and no push run fired). Opens/refreshes the release PR.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish:
    name: Publish artifacts
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      ref: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
