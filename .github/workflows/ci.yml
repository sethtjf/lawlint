name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config
      - name: Prepare desktop frontend directory
        run: mkdir -p apps/desktop/dist
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo install wasm-pack --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build

  # Cut a release when validated code lands on main. Runs only after `verify`
  # succeeds, only for pushes to main. Derives the next version from Conventional
  # Commits since the last tag; a batch with no feat/fix/perf/breaking commit
  # produces no version bump and no release (change `default_bump` to `patch` to
  # release on every merge instead).
  auto-release:
    name: Cut release
    needs: verify
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release: ${{ steps.publish.outputs.release }}
      version: ${{ steps.publish.outputs.version }}
      tag: ${{ steps.publish.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Guard against a concurrent push to main
        id: guard
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          head="$(git rev-parse origin/main)"
          if [ "$head" != "$GITHUB_SHA" ]; then
            echo "main advanced past $GITHUB_SHA (now $head); a newer run will release. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Compute next version from Conventional Commits
        id: bump
        if: ${{ steps.guard.outputs.skip != 'true' }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: false
          dry_run: true
      - name: Bump manifest, commit, and tag
        id: publish
        if: ${{ steps.guard.outputs.skip != 'true' && steps.bump.outputs.release_type != '' }}
        env:
          # From the tagger's validated semver output — never from commit text.
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$NEW_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Refusing to release: computed version '$NEW_VERSION' is not X.Y.Z"
            exit 1
          fi
          tag="v${NEW_VERSION}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::Tag ${tag} already exists; aborting."
            exit 1
          fi
          # Bump the [workspace.package] version (first `version =` line in the
          # root manifest; workspace members inherit via version.workspace = true).
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"${NEW_VERSION}\"/" Cargo.toml
          cargo update --workspace --quiet
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): ${tag} [skip ci]"
          git tag -a "${tag}" -m "lawlint ${tag}"
          git push origin "HEAD:main"
          git push origin "refs/tags/${tag}"
          {
            echo "release=true"
            echo "version=${NEW_VERSION}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"

  # Build + publish the CLI and desktop artifacts for the tag just cut. Calls the
  # release pipeline directly (a tag pushed by GITHUB_TOKEN does not itself
  # trigger workflows), building the tagged commit with the bumped version.
  release:
    name: Publish
    needs: auto-release
    if: ${{ needs.auto-release.outputs.release == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.auto-release.outputs.version }}
      ref: ${{ needs.auto-release.outputs.tag }}
    secrets: inherit
