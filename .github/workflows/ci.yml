name: CI

on:
  push:
  pull_request:

jobs:
  # release-please skips a commit it cannot parse without failing anything, so
  # an unreadable message costs a release silently. Catch it here, where the
  # fix is a reword rather than an extra commit on main. Bodies count: this
  # repo squashes with COMMIT_MESSAGES, so every commit body on the branch
  # lands in the message release-please reads.
  commit-messages:
    name: Commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Preview the squash-merge message
        # A PR title is untrusted input; pass it through the environment so it
        # is never interpolated into the shell command.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          bun run scripts/check-commit-messages.mjs \
            --squash-preview "$BASE_SHA" --title "$PR_TITLE" --pr "$PR_NUMBER"

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config
      - name: Prepare desktop frontend directory
        run: mkdir -p apps/desktop/dist
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo install wasm-pack --locked
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --workspace
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # Blume's CLI runs under Node (its bin has a `node` shebang) and requires
      # 22.12+, as does the Astro 7 it generates against.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build
